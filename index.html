<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Frame a Frame</title>
  <link rel="stylesheet" href="./style/main.css">
</head>

<body>
  <div id="app">
    <div class="topbar">
      <h1 data-i18n="title">&#9654; player frame a frame</h1>

      <label class="lang-switch" for="language-select">
        <span data-i18n="languageLabel">Language</span>
        <select id="language-select" aria-label="Language selector">
          <option value="en">EN</option>
          <option value="pt-BR">PT-BR</option>
        </select>
      </label>
    </div>

    <button id="drop-zone" class="drop-zone" type="button" aria-controls="file-in">
      <div class="icon" aria-hidden="true">&#11014;</div>
      <div class="drop-title" data-i18n="dropTitle">Drop a video here or click to open</div>
      <div class="sub" data-i18n="dropSub">MP4, WebM, MOV, AVI...</div>
    </button>
    <input type="file" id="file-in" accept="video/*" class="sr-only">

    <div id="player-wrap">
      <div id="canvas-wrap">
        <video id="vid" preload="auto" muted playsinline></video>
        <canvas id="cv"></canvas>
        <div id="overlay-info">frame -</div>
      </div>

      <div id="controls">
        <div class="ctrl-row">
          <input type="range" id="seek" min="0" max="1000" value="0" step="1">
        </div>

        <div class="ctrl-row">
          <button class="btn" id="btn-prev" type="button">&#9664; <span data-i18n="prev">prev</span></button>
          <button class="btn accent" id="btn-play" type="button">&#9654; <span data-i18n="play">play</span></button>
          <button class="btn" id="btn-next" type="button"><span data-i18n="next">next</span> &#9654;</button>

          <div class="vol-wrap">
            <button class="btn" id="btn-mute" type="button" aria-label="Mute">&#128266;</button>
            <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0">
          </div>

          <span style="flex:1"></span>
          <label class="label" for="fps-input">FPS</label>
          <input type="number" id="fps-input" value="24" min="1" max="240" inputmode="numeric">
          <button class="btn" id="btn-loop" type="button">&#8634; <span data-i18n="loop">loop</span></button>
        </div>

        <div class="ctrl-row">
          <span class="label" data-i18n="speed">speed</span>
          <input type="range" id="speed" min="-3" max="3" value="0" step="1">
          <span id="speed-label">1x</span>
          <button class="btn snapshot-btn" id="btn-snapshot" type="button" data-i18n="snapshot"
            title="Take a snapshot">📷 Snapshot</button>
        </div>

        <div id="info-bar">
          <span><span data-i18n="frame">frame</span> <b id="i-frame">0</b></span>
          <span><span data-i18n="time">time</span> <b id="i-time">0.000s</b></span>
          <span><span data-i18n="duration">duration</span> <b id="i-dur">-</b></span>
          <span><span data-i18n="resolution">resolution</span> <b id="i-res">-</b></span>
        </div>
      </div>
    </div>

    <div id="shortcuts">
      <div class="shortcut-item"><kbd>&larr;</kbd><kbd>&rarr;</kbd> <span data-i18n="shortcutFrames">frame by
          frame</span></div>
      <div class="shortcut-item"><kbd>J</kbd><kbd>K</kbd><kbd>L</kbd> <span data-i18n="shortcutJKL">navigation</span>
      </div>
      <div class="shortcut-item"><kbd>space</kbd> <span data-i18n="shortcutPlay">play/pause</span></div>
      <div class="shortcut-item"><kbd>M</kbd> <span data-i18n="shortcutMute">mute</span></div>
      <div class="shortcut-item"><kbd>1-7</kbd> <span data-i18n="shortcutSpeed">speed</span></div>
    </div>

    <footer>
      <div data-i18n="footerCredit">Made with &hearts; by Cristiano Camacho</div>
      <div class="footer-socials">
        <a class="social-link" href="https://x.com/cristianocode" target="_blank" rel="noreferrer"
          aria-label="Cristiano Code on X">X</a>
        <a class="social-link linkedin" href="https://www.linkedin.com/in/cristianocamacho/" target="_blank"
          rel="noreferrer" aria-label="Cristiano Camacho on LinkedIn">in</a>
      </div>
    </footer>
  </div>

  <script type="module" src="./app.js"></script>
</body>

</html>
