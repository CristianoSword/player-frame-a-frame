<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Frame a Frame</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #e8e8e8;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #app {
      width: 100%;
      max-width: 860px;
    }

    h1 {
      font-size: 14px;
      font-weight: normal;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    #drop-zone {
      border: 1.5px dashed #333;
      border-radius: 10px;
      padding: 3rem 1rem;
      text-align: center;
      cursor: pointer;
      color: #555;
      font-size: 14px;
      transition: background 0.15s, border-color 0.15s;
    }

    #drop-zone:hover {
      background: #1a1a1a;
      border-color: #555;
    }

    #drop-zone .icon { font-size: 28px; margin-bottom: 10px; }
    #drop-zone .sub { font-size: 12px; margin-top: 6px; color: #3a3a3a; }

    #player-wrap { display: none; }

    #canvas-wrap {
      position: relative;
      display: none;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
    }

    video {
      width: 100%;
      display: block;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      pointer-events: none;
    }

    #overlay-info {
      position: absolute;
      top: 10px; right: 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: #ccc;
      font-family: 'Courier New', monospace;
    }

    #controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #888;
      height: 4px;
      cursor: pointer;
    }

    .btn {
      background: transparent;
      border: 0.5px solid #333;
      border-radius: 7px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      color: #ccc;
      font-family: 'Courier New', monospace;
      transition: background 0.1s, transform 0.08s, border-color 0.1s;
      white-space: nowrap;
    }

    .btn:hover { background: #1e1e1e; border-color: #555; }
    .btn:active { transform: scale(0.97); }
    .btn.accent { border-color: #4a90d9; color: #7ab8f5; }

    #fps-input {
      width: 58px;
      border: 0.5px solid #333;
      border-radius: 7px;
      padding: 5px 8px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      background: #1a1a1a;
      color: #ccc;
      text-align: center;
    }

    #fps-input:focus { outline: none; border-color: #555; }

    .label {
      font-size: 12px;
      color: #555;
      white-space: nowrap;
    }

    #speed-label {
      font-size: 12px;
      color: #777;
      min-width: 40px;
      text-align: right;
    }

    #info-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 12px;
      color: #555;
      padding-top: 4px;
    }

    #info-bar b { color: #aaa; font-weight: 500; }

    #shortcuts {
      margin-top: 1.5rem;
      font-size: 11px;
      color: #333;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    #shortcuts span { color: #555; }
  </style>
</head>
<body>
<div id="app">
  <h1>▶ player frame a frame</h1>

  <div id="drop-zone" onclick="document.getElementById('file-in').click()"
       ondragover="ev(event,'over')" ondragleave="ev(event,'out')" ondrop="ev(event,'drop')">
    <div class="icon">⬆</div>
    <div>Solte um vídeo aqui ou clique para abrir</div>
    <div class="sub">MP4, WebM, MOV, AVI…</div>
    <input type="file" id="file-in" accept="video/*" style="display:none" onchange="loadFile(this)">
  </div>

  <div id="player-wrap">
    <div id="canvas-wrap">
      <video id="vid" preload="auto" muted playsinline></video>
      <canvas id="cv"></canvas>
      <div id="overlay-info">frame —</div>
    </div>

    <div id="controls">
      <div class="ctrl-row">
        <input type="range" id="seek" min="0" max="1000" value="0" step="1">
      </div>

      <div class="ctrl-row">
        <button class="btn" id="btn-prev">◀ prev</button>
        <button class="btn accent" id="btn-play">▶ play</button>
        <button class="btn" id="btn-next">next ▶</button>
        <span style="flex:1"></span>
        <span class="label">FPS</span>
        <input type="number" id="fps-input" value="24" min="1" max="240">
        <button class="btn" id="btn-loop">↺ loop</button>
      </div>

      <div class="ctrl-row">
        <span class="label">velocidade</span>
        <input type="range" id="speed" min="-3" max="3" value="0" step="1">
        <span id="speed-label">1×</span>
      </div>

      <div id="info-bar">
        <span>frame <b id="i-frame">0</b></span>
        <span>tempo <b id="i-time">0.000s</b></span>
        <span>duração <b id="i-dur">—</b></span>
        <span>resolução <b id="i-res">—</b></span>
      </div>
    </div>
  </div>

  <div id="shortcuts">
    <span>← → frame a frame</span>
    <span>espaço play/pause</span>
  </div>
</div>

<script>
  const vid = document.getElementById('vid');
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const seekEl = document.getElementById('seek');
  const playBtn = document.getElementById('btn-play');
  const loopBtn = document.getElementById('btn-loop');
  const fpsIn = document.getElementById('fps-input');
  const speedEl = document.getElementById('speed');
  const speedLbl = document.getElementById('speed-label');
  const overlay = document.getElementById('overlay-info');
  const dropZ = document.getElementById('drop-zone');
  const wrap = document.getElementById('player-wrap');
  const canvasWrap = document.getElementById('canvas-wrap');

  let isPlaying = false, looping = false, raf, speedMult = 1, lastTs = null;

  function ev(e, t) {
    e.preventDefault();
    if (t === 'over') dropZ.style.borderColor = '#666';
    else if (t === 'out') dropZ.style.borderColor = '';
    else { dropZ.style.borderColor = ''; const f = e.dataTransfer.files[0]; if (f) initVideo(f); }
  }

  function loadFile(inp) { if (inp.files[0]) initVideo(inp.files[0]); }

  function initVideo(file) {
    const url = URL.createObjectURL(file);
    vid.src = url;
    vid.onloadedmetadata = () => {
      cv.width = vid.videoWidth;
      cv.height = vid.videoHeight;
      document.getElementById('i-dur').textContent = vid.duration.toFixed(3) + 's';
      document.getElementById('i-res').textContent = vid.videoWidth + '×' + vid.videoHeight;
      wrap.style.display = 'block';
      canvasWrap.style.display = 'block';
      dropZ.style.display = 'none';
      drawFrame();
      updateInfo();
    };
    vid.onseeked = drawFrame;
  }

  function drawFrame() {
    ctx.drawImage(vid, 0, 0, cv.width, cv.height);
    updateInfo();
  }

  function fps() { return parseFloat(fpsIn.value || 24); }
  function frameStep() { return 1 / fps(); }

  function updateInfo() {
    const f = Math.round(vid.currentTime / frameStep());
    document.getElementById('i-frame').textContent = f;
    document.getElementById('i-time').textContent = vid.currentTime.toFixed(3) + 's';
    seekEl.value = vid.duration ? Math.round((vid.currentTime / vid.duration) * 1000) : 0;
    overlay.textContent = 'frame ' + f + '  ' + vid.currentTime.toFixed(3) + 's';
  }

  function stepFrame(dir) {
    let t = vid.currentTime + dir * frameStep();
    t = Math.max(0, Math.min(vid.duration || 0, t));
    vid.currentTime = t;
  }

  document.getElementById('btn-prev').onclick = () => { stopPlay(); stepFrame(-1); };
  document.getElementById('btn-next').onclick = () => { stopPlay(); stepFrame(1); };
  playBtn.onclick = () => { isPlaying ? stopPlay() : startPlay(); };

  loopBtn.onclick = () => {
    looping = !looping;
    loopBtn.style.borderColor = looping ? '#4a90d9' : '';
    loopBtn.style.color = looping ? '#7ab8f5' : '';
  };

  function startPlay() {
    isPlaying = true;
    lastTs = null;
    playBtn.textContent = '⏸ pause';
    playBtn.classList.add('accent');
    raf = requestAnimationFrame(tick);
  }

  function stopPlay() {
    isPlaying = false;
    playBtn.textContent = '▶ play';
    playBtn.classList.remove('accent');
    cancelAnimationFrame(raf);
  }

  function tick(ts) {
    if (!isPlaying) return;
    raf = requestAnimationFrame(tick);
    if (!lastTs) { lastTs = ts; return; }
    const dt = (ts - lastTs) / 1000;
    lastTs = ts;
    let t = vid.currentTime + dt * speedMult;
    const dur = vid.duration || 0;
    if (t >= dur) {
      t = looping ? 0 : dur;
      if (!looping) stopPlay();
    }
    if (t < 0) {
      t = looping ? dur : 0;
      if (!looping) stopPlay();
    }
    vid.currentTime = t;
  }

  seekEl.oninput = () => {
    stopPlay();
    if (vid.duration) vid.currentTime = (seekEl.value / 1000) * vid.duration;
  };

  speedEl.oninput = () => {
    const map = {'-3':[-8,'⅛×'],'-2':[-4,'¼×'],'-1':[-2,'½×'],'0':[1,'1×'],'1':[2,'2×'],'2':[4,'4×'],'3':[8,'8×']};
    const res = map[speedEl.value] || [1,'1×'];
    speedMult = res[0];
    speedLbl.textContent = res[1];
  };

  document.addEventListener('keydown', e => {
    if (!vid.src) return;
    if (e.key === 'ArrowRight') { e.preventDefault(); stopPlay(); stepFrame(1); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); stopPlay(); stepFrame(-1); }
    else if (e.key === ' ') { e.preventDefault(); isPlaying ? stopPlay() : startPlay(); }
  });
</script>
</body>
</html>
