<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Frame a Frame</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #e8e8e8;
      font-family: "Courier New", Courier, monospace;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #app {
      width: 100%;
      max-width: 860px;
    }

    h1 {
      font-size: 14px;
      font-weight: normal;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    #drop-zone {
      width: 100%;
      border: 1.5px dashed #333;
      border-radius: 10px;
      padding: 3rem 1rem;
      text-align: center;
      cursor: pointer;
      color: #555;
      font-size: 14px;
      transition: background 0.15s, border-color 0.15s;
      background: transparent;
      font: inherit;
    }

    #drop-zone:hover,
    #drop-zone:focus-visible,
    #drop-zone.is-dragover {
      background: #1a1a1a;
      border-color: #555;
      outline: none;
    }

    #drop-zone .icon { font-size: 28px; margin-bottom: 10px; }
    #drop-zone .sub { font-size: 12px; margin-top: 6px; color: #3a3a3a; }

    #player-wrap { display: none; }

    #canvas-wrap {
      position: relative;
      display: none;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
    }

    video {
      width: 100%;
      display: block;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      pointer-events: none;
    }

    #overlay-info {
      position: absolute;
      top: 10px; right: 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: #ccc;
      font-family: "Courier New", monospace;
    }

    #controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #888;
      height: 4px;
      cursor: pointer;
    }

    .btn {
      background: transparent;
      border: 0.5px solid #333;
      border-radius: 7px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      color: #ccc;
      font-family: "Courier New", monospace;
      transition: background 0.1s, transform 0.08s, border-color 0.1s;
      white-space: nowrap;
    }

    .btn:hover,
    .btn:focus-visible { background: #1e1e1e; border-color: #555; outline: none; }
    .btn:active { transform: scale(0.97); }
    .btn.accent { border-color: #4a90d9; color: #7ab8f5; }

    #fps-input {
      width: 58px;
      border: 0.5px solid #333;
      border-radius: 7px;
      padding: 5px 8px;
      font-size: 13px;
      font-family: "Courier New", monospace;
      background: #1a1a1a;
      color: #ccc;
      text-align: center;
    }

    #fps-input:focus { outline: none; border-color: #555; }

    .label {
      font-size: 12px;
      color: #555;
      white-space: nowrap;
    }

    #speed-label {
      font-size: 12px;
      color: #777;
      min-width: 40px;
      text-align: right;
    }

    #info-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 12px;
      color: #555;
      padding-top: 4px;
    }

    #info-bar b { color: #aaa; font-weight: 500; }

    #shortcuts {
      margin-top: 1.5rem;
      font-size: 11px;
      color: #333;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    #shortcuts span { color: #555; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
<div id="app">
  <h1>&#9654; player frame a frame</h1>

  <button id="drop-zone" type="button" aria-controls="file-in">
    <div class="icon" aria-hidden="true">&#11014;</div>
    <div>Solte um video aqui ou clique para abrir</div>
    <div class="sub">MP4, WebM, MOV, AVI...</div>
  </button>
  <input type="file" id="file-in" accept="video/*" class="sr-only">

  <div id="player-wrap">
    <div id="canvas-wrap">
      <video id="vid" preload="auto" muted playsinline></video>
      <canvas id="cv"></canvas>
      <div id="overlay-info">frame -</div>
    </div>

    <div id="controls">
      <div class="ctrl-row">
        <input type="range" id="seek" min="0" max="1000" value="0" step="1" aria-label="Barra de progresso do video">
      </div>

      <div class="ctrl-row">
        <button class="btn" id="btn-prev" type="button">&#9664; prev</button>
        <button class="btn accent" id="btn-play" type="button">&#9654; play</button>
        <button class="btn" id="btn-next" type="button">next &#9654;</button>
        <span style="flex:1"></span>
        <label class="label" for="fps-input">FPS</label>
        <input type="number" id="fps-input" value="24" min="1" max="240" inputmode="numeric">
        <button class="btn" id="btn-loop" type="button">&#8634; loop</button>
      </div>

      <div class="ctrl-row">
        <span class="label">velocidade</span>
        <input type="range" id="speed" min="-3" max="3" value="0" step="1">
        <span id="speed-label">1x</span>
      </div>

      <div id="info-bar">
        <span>frame <b id="i-frame">0</b></span>
        <span>tempo <b id="i-time">0.000s</b></span>
        <span>duracao <b id="i-dur">-</b></span>
        <span>resolucao <b id="i-res">-</b></span>
      </div>
    </div>
  </div>

  <div id="shortcuts">
    <span>&larr; &rarr; frame a frame</span>
    <span>espaco play/pause</span>
  </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
